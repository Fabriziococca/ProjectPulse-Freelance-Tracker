<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>ProjectPulse V1.3</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1>Project<span class="accent">Pulse</span></h1>
            <button id="btnReload" class="btn-icon" title="Recargar App">🔄</button>
        </header>

        <!-- DASHBOARD FINANCIERO -->
        <div class="dashboard-container">
            <div class="stat-card">
                <h4>Activos</h4>
                <div class="stat-value">
                    <span id="activeUSD" class="stat-usd">USD 0.00</span>
                    <span id="activeARS" class="stat-ars">ARS 0.00</span>
                </div>
            </div>
            <div class="stat-card">
                <h4>Ingresos del Mes</h4>
                <div class="stat-value">
                    <span id="monthUSD" class="stat-usd">USD 0.00</span>
                    <span id="monthARS" class="stat-ars">ARS 0.00</span>
                </div>
            </div>
            <div class="stat-card" style="border-bottom: 3px solid var(--accent);">
                <h4>Histórico Total</h4>
                <div class="stat-value">
                    <span id="totalUSD" class="stat-usd">USD 0.00</span>
                    <span id="totalARS" class="stat-ars">ARS 0.00</span>
                </div>
            </div>
        </div>

        <div class="card form-card">
            <h3>Nuevo Proyecto</h3>
            <form id="projectForm">
                <div class="input-group">
                    <label>Cliente / Proyecto</label>
                    <div class="form-row">
                        <input type="text" id="clientName" class="text-input half" required placeholder="Cliente">
                        <input type="text" id="projectName" class="text-input half" required placeholder="Proyecto">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group half">
                        <label>Aceptación</label>
                        <input type="datetime-local" id="acceptDate" class="date-input" required>
                    </div>
                    <div class="input-group half">
                        <label>Días de Entrega</label>
                        <input type="number" id="deliveryDays" class="number-input" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group half">
                        <label>Presupuesto Bruto</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="currencySelect" class="text-input" style="flex: 0 0 auto; padding-left: 5px; padding-right: 5px;">
                                <option value="USD">USD</option>
                                <option value="ARS">ARS</option>
                            </select>
                            <input type="number" id="budgetGross" class="number-input" min="0" step="0.01" required style="flex: 1;">
                        </div>
                    </div>
                    <div class="input-group half">
                        <label>Comisión Workana</label>
                        <select id="workanaFeeSelect" class="text-input">
                            <option value="20">20% (Estándar)</option>
                            <option value="15">15%</option>
                            <option value="10">10% (Frecuente)</option>
                            <option value="direct">Particular (0% Costo)</option>
                            <option value="custom">Exacta (Manual) %</option>
                        </select>
                    </div>
                </div>

                <div id="customFeeContainer" class="input-group hidden">
                    <label>Comisión Workana Manual (%)</label>
                    <input type="number" id="customWorkanaFee" class="number-input" min="0" max="100" step="0.1" value="0">
                </div>

                <div class="input-group" style="margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; background: #334155; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                        <input type="checkbox" id="isDelegated" style="width: 20px; height: 20px; accent-color: var(--accent);">
                        <span style="color: white; font-size: 0.95rem; font-weight: 500;">Proyecto Delegado (Me llevo el 30%)</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">➕ Agregar Proyecto</button>
            </form>
        </div>

        <hr class="divider">

        <div class="projects-header">
            <h3>Proyectos Activos</h3>
            <span id="activeCount" class="badge">0</span>
        </div>
        <div id="projectsList" class="projects-container"></div>

        <hr class="divider">

        <div class="backup-section">
            <button id="btnExport" class="btn-text">Descargar Backup (JSON)</button>
            <label for="importFile" class="btn-text" style="cursor:pointer; display:block;">Importar Backup</label>
            <input type="file" id="importFile" class="hidden" accept=".json">
        </div>
    </div>

    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Modificar Proyecto</h3>
            <p class="modal-desc">Ajustá tiempos o sumá presupuesto extra.</p>
            
            <div class="input-group">
                <label>Sumar Días al Plazo</label>
                <input type="number" id="extraDays" class="number-input" min="0" value="0">
            </div>
            <div class="input-group">
                <label>Sumar Presupuesto Bruto</label>
                <input type="number" id="extraBudget" class="number-input" min="0" step="0.01" value="0">
            </div>

            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-cancel">Cancelar</button>
                <button id="modal-save" class="btn btn-save">Guardar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
